version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign

formatters:
  enable:
    - gofmt
run:
  # CI hosts run several runners; golangci-lint's default single-instance lock
  # trips ("parallel golangci-lint is running") when two lint jobs overlap on
  # one host. Caches are per-runner-home, so parallel runs are safe.
  allow-parallel-runners: true
